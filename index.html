<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTO LANDING PAGE GENERATOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="https://cdn.orderonline.id/uploads/images_8633291767803962604.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .preview-iframe-container {
            background-color: #f8f9fa;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .gradient-bg {
            background: linear-gradient(-45deg, #ec4899, #9333ea, #db2777, #7c3aed, #f472b6, #a855f7);
            background-size: 400% 400%;
            animation: gradientMove 8s ease infinite;
        }
        
        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        .preview-container {
            min-height: 200px;
            max-height: 500px;
            overflow: auto;
            background: #1e1e1e;
            border-radius: 8px;
        }
        
        .preview-container pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            padding: 16px;
            color: #d4d4d4;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.5;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .form-input {
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-7xl mx-auto">
            <!-- Header -->
            <div class="text-center mb-8">

                            </div>

                            <!-- Baris Dua -->
                            <div>
                                <label class="block text-white font-semibold mb-2" for="barisdua">

                                    Judul Produk
                                </label>
                                <input type="text" id="barisdua" class="form-input w-full px-4 py-3 bg-white/90 border border-white/30 rounded-lg focus:ring-2 focus:ring-pink-400 focus:border-pink-400 text-gray-900" placeholder="Pashmina Instan Malay">
                            </div>

                            <!-- Baris Tiga -->
                            <div>
                                <label class="block text-white font-semibold mb-2" for="baristiga">
                                    <span class="bg-white/20 text-white px-2 py-1 rounded text-sm mr-2 backdrop-blur-sm">3</span>

                                </label>
                                <input type="text" id="baristiga" class="form-input w-full px-4 py-3 bg-white/90 border border-white/30 rounded-lg focus:ring-2 focus:ring-pink-400 focus:border-pink-400 text-gray-900" placeholder="Asian Shop">

                            <!-- Baris Empat -->

                                <textarea id="barislima" rows="3" class="form-input w-full px-4 py-3 bg-white/90 border border-white/30 rounded-lg focus:ring-2 focus:ring-pink-400 focus:border-pink-400 text-gray-900" placeholder="<li>Panjang Depan: 90cm</li>&#10;<li>Panjang Belakang: 110cm</li>"></textarea>
                            </div>

                            <!-- Baris Enam -->

                            <!-- Feature Images Group -->

                            </div>

                            <!-- Generate Button -->
                            <div class="pt-4">

    <script>
        // Update live preview
        function updateLivePreview(html) {
            const iframe = document.getElementById('livePreview');
            iframe.srcdoc = html;
        }

        document.getElementById('generateBtn').addEventListener('click', function() {
            // Get all form values
            const fields = {
                barissatu: document.getElementById('barissatu').value || 'Flash Sale Product',
                barisdua: document.getElementById('barisdua').value || 'Nama Produk',
                baristiga: document.getElementById('baristiga').value || 'Nama Toko',
                barisempat: document.getElementById('barisempat').value.replace(/\n/g, '<br>') || 'Deskripsi produk...',

                baristujuh: document.getElementById('baristujuh').value || 'https://via.placeholder.com/400x300',
                barisdelapan: document.getElementById('barisdelapan').value.replace(/\n/g, '<br>') || 'Detail fitur 1',
                barissembilan: document.getElementById('barissembilan').value || 'https://via.placeholder.com/400x300',
                barissepuluh: document.getElementById('barissepuluh').value.replace(/\n/g, '<br>') || 'Detail fitur 2',
                barissebelas: document.getElementById('barissebelas').value || 'https://via.placeholder.com/400x300',
                barisduabelas: document.getElementById('barisduabelas').value.replace(/\n/g, '<br>') || 'Detail fitur 3',
                baristigabelas: document.getElementById('baristigabelas').value || 'https://via.placeholder.com/100',
                barisempatbelas: document.getElementById('barisempatbelas').value || 'https://via.placeholder.com/100',
                barislimabelas: document.getElementById('barislimabelas').value || 'https://via.placeholder.com/100',
                barisenambelas: document.getElementById('barisenambelas').value || 'https://via.placeholder.com/100',
                baristujuhbelas: document.getElementById('baristujuhbelas').value || 'https://via.placeholder.com/100',
                barisdelapanbelas: document.getElementById('barisdelapanbelas').value || 'https://via.placeholder.com/100',
                barissembilanbelas: document.getElementById('barissembilanbelas').value || '225.000',
                barisduapuluh: document.getElementById('barisduapuluh').value || '165.000',
                barisduasatu: document.getElementById('barisduasatu').value || '<div style="padding:20px;text-align:center;background:#f3f4f6;border-radius:8px;">Form Pemesanan akan muncul di sini</div>'
            };

            // Generate the HTML
            const generatedHTML = `<!DOCTYPE html>

    </style>
</head>
<body class="max-w-md mx-auto bg-gray-100 pb-24">
    
    <!-- Hero Image -->

        </div>

        <!-- Price Section -->
        <div class="flex items-end gap-3 mb-3 flex-wrap">
            <span class="text-red-600 font-bold text-3xl">Rp${fields.barisduapuluh}</span>

            <span class="bg-red-100 text-red-600 text-xs px-2 py-1 rounded font-bold">-54% OFF</span>
        </div>

        <!-- Flash Sale -->
        <div class="flash-sale-bg text-white p-3 rounded-lg flex items-center justify-between">

                </div>
            </div>
        </div>
    </div>

    <!-- Shop Info -->
    <div class="bg-white mt-2 p-4 shadow-sm">
        <div class="flex items-center gap-3 mb-3">
            <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center overflow-hidden border border-gray-200">
                <img src="https://cdn.orderonline.id/uploads/images_8633291767803962604.png" class="w-full h-full object-cover">
            </div>
            <div class="flex-1">
                <h3 class="font-bold text-gray-900">${fields.baristiga}</h3>
                <div class="flex items-center gap-3 text-xs text-gray-500 mt-1">
                    <span class="flex items-center gap-1">
                        <i data-lucide="map-pin" class="w-3 h-3"></i> Jakarta Selatan
                    </span>
                </div>
            </div>
        </div>
        <div class="grid grid-cols-3 gap-4 pt-3 border-t border-gray-100 text-center text-sm">
            <div>
                <div class="font-bold text-gray-900">4.8</div>
                <div class="text-xs text-gray-500">Rating</div>
            </div>
            <div>
                <div class="font-bold text-gray-900">1.2K</div>
                <div class="text-xs text-gray-500">Penilaian</div>
            </div>
            <div>
                <div class="font-bold text-gray-900">10RB+</div>
                <div class="text-xs text-gray-500">Terjual</div>
            </div>
        </div>
    </div>

    <!-- Variants -->
    <div class="mt-2 bg-white p-4">
        <div class="flex justify-between items-center mb-3">
            <span class="text-sm font-medium text-gray-600">Varian Warna</span>
            <span class="text-xs text-gray-400">Pilih varian</span>
        </div>
        <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-2">
            ${fields.baristigabelas ? `<button class="variant-btn variant-selected border-2 border-gray-200 rounded-lg p-1 min-w-[80px] transition-all hover:border-red-400"><img src="${fields.baristigabelas}" class="w-full h-16 object-cover rounded"></button>` : ''}

    <script>
        // Flash Sale Countdown
        function updateFlashSaleTimer() {
            const now = new Date();
            const endOfDay = new Date(now);
            endOfDay.setHours(23, 59, 59, 999);
            let diff = endOfDay - now;
            
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            const hoursEl = document.getElementById('flashHours');
            const minutesEl = document.getElementById('flashMinutes');
            const secondsEl = document.getElementById('flashSeconds');
            
            if (hoursEl && minutesEl && secondsEl) {
                hoursEl.textContent = hours.toString().padStart(2, '0');
                minutesEl.textContent = minutes.toString().padStart(2, '0');
                secondsEl.textContent = seconds.toString().padStart(2, '0');
            }
        }
        
        setInterval(updateFlashSaleTimer, 1000);
        updateFlashSaleTimer();
        
        // Initialize Lucide icons
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
        
        // Variant selection with image swap
        const mainImage = document.querySelector('section img');
        document.querySelectorAll('.variant-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                // Update main image with smooth transition
                const newImgSrc = this.dataset.img;
                if (newImgSrc && mainImage) {
                    mainImage.style.opacity = '0.5';
                    setTimeout(() => {
                        mainImage.src = newImgSrc;
                        mainImage.style.opacity = '1';
                    }, 150);
                }
                
                // Reset all variants
                document.querySelectorAll('.variant-btn').forEach(b => {
                    b.classList.remove('border-red-500', 'shadow-md');
                    b.classList.add('border-gray-200', 'shadow-sm');
                    const checkIcon = b.querySelector('.check-icon');
                    if (checkIcon) {
                        checkIcon.classList.add('opacity-0', 'scale-0');
                        checkIcon.classList.remove('opacity-100', 'scale-100');
                    }
                });
                
                // Activate selected variant
                this.classList.remove('border-gray-200', 'shadow-sm');
                this.classList.add('border-red-500', 'shadow-md');
                const checkIcon = this.querySelector('.check-icon');
                if (checkIcon) {
                    checkIcon.classList.remove('opacity-0', 'scale-0');
                    checkIcon.classList.add('opacity-100', 'scale-100');
                }
            });
        });
    <\/script>

            // Display in preview container with syntax highlighting
            const previewContainer = document.getElementById('previewContainer');
            previewContainer.innerHTML = `<pre>${escapeHtml(generatedHTML)}</pre>`;
            
            // Update live preview
            updateLivePreview(generatedHTML);
            
            // Scroll to preview
            previewContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });

        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Copy functionality
        document.getElementById('copyBtn').addEventListener('click', function() {
            const previewText = document.querySelector('#previewContainer pre');
            if (previewText) {
                navigator.clipboard.writeText(previewText.textContent)
                    .then(() => {
                        const originalHTML = this.innerHTML;
                        this.innerHTML = '<i class="fas fa-check mr-2"></i>Copied!';
                        this.classList.add('bg-green-100', 'text-green-800', 'border-green-300');
                        setTimeout(() => {
                            this.innerHTML = originalHTML;
                            this.classList.remove('bg-green-100', 'text-green-800', 'border-green-300');
                        }, 2000);
                    })
                    .catch(err => {
                        console.error('Failed to copy:', err);
                        alert('Gagal menyalin kode. Silakan copy manual.');
                    });
            }
        });

        // Download functionality
        document.getElementById('downloadBtn').addEventListener('click', function() {
            const previewText = document.querySelector('#previewContainer pre');
            if (previewText) {
                const blob = new Blob([previewText.textContent], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const productName = document.getElementById('barisdua').value || 'landing-page';
                a.href = url;
                a.download = `landing-page-${productName.toLowerCase().replace(/\s+/g, '-')}.html`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                // Visual feedback
                const originalHTML = this.innerHTML;
                this.innerHTML = '<i class="fas fa-check mr-2"></i>Downloaded!';
                setTimeout(() => {
                    this.innerHTML = originalHTML;
                }, 2000);
            } else {
                alert('Silakan generate landing page terlebih dahulu!');
            }
        });

        // Add subtle animation to form inputs
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', function() {
                this.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
</body>
